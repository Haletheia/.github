name: SpecSurge API Regression Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-regression-tests:
    name: api-regression-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start Mock API Gateway
        run: |
          # The real API Gateway should be booted here.
          # For now, we use a simple Python HTTP server to mock it.
          python3 -m http.server 8080 &
          # Wait for the server to start
          sleep 2

      - name: Run SpecSurge
        run: |
          chmod +x apps/7-testing/SpecSurge/specsurge.sh
          apps/7-testing/SpecSurge/specsurge.sh --spec apps/7-testing/SpecSurge/openapi-mock.json --base-url http://localhost:8080
